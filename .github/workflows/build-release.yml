name: Build TS Extension (PNPM)

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. Setup PNPM (This is the magic part)
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9 # or your preferred version

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm' # Auto-caches your dependencies for speed!

      # 2. Install Dependencies & Build using PNPM
      - name: Install & Build
        run: |
          pnpm install --frozen-lockfile
          pnpm run build
        # Ensure your package.json has "scripts": {"build": "..."}

      # 3. Install CRX Utility (Global tools are fine with npm)
      - name: Install CRX Utility
        run: npm install -g crx json

      - name: Restore Private Key
        run: echo "${{ secrets.PEM_KEY }}" > private.pem

      # 4. Pack the CRX (Targeting 'dist' folder)
      - name: Pack CRX
        run: |
          mkdir -p dist
          crx pack dist -o dist/extension.crx -p private.pem

      # 5. Generate update.xml
      - name: Generate update.xml
        run: |
          # Use jq to read version from the BUILT manifest
          VERSION=$(cat dist/manifest.json | jq -r .version)
          APP_ID="${{ secrets.APP_ID }}"
          CRX_URL="https://github.com/${{ github.repository }}/releases/download/latest/extension.crx"
          
          echo "Building XML for Version: $VERSION"

          cat <<EOF > dist/update.xml
          <?xml version='1.0' encoding='UTF-8'?>
          <gupdate xmlns='http://www.google.com/update2/response' protocol='2.0'>
            <app appid='$APP_ID'>
              <updatecheck codebase='$CRX_URL' version='$VERSION' />
            </app>
          </gupdate>
          EOF

      # 6. Release to GitHub
      - name: Update Latest Release
        uses: pyTooling/Actions/releaser@r0
        with:
          tag: latest
          rm_existing_tag: true
          files: |
            dist/extension.crx
            dist/update.xml
          token: ${{ secrets.GITHUB_TOKEN }}
