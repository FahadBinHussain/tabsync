name: Build TS Extension & Release

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 1. Install Dependencies & Build
      # This runs your 'manifest.ts' -> 'manifest.json' logic
      - name: Install & Build
        run: |
          npm ci
          npm run build 
        # ^^^ MAKE SURE your package.json has a "build" script that outputs to a 'dist' folder!

      - name: Install CRX Utility
        run: npm install -g crx json

      - name: Restore Private Key
        run: echo "${{ secrets.PEM_KEY }}" > private.pem

      # 2. Pack the CRX
      # IMPORTANT: We pack the 'dist' folder now, not 'src'
      - name: Pack CRX
        run: |
          crx pack dist -o dist/extension.crx -p private.pem

      # 3. Generate update.xml
      # We read the version from the COMPILED manifest.json in /dist
      - name: Generate update.xml
        run: |
          VERSION=$(cat dist/manifest.json | jq -r .version)
          APP_ID="${{ secrets.APP_ID }}"
          # Direct link to the 'latest' release asset
          CRX_URL="https://github.com/${{ github.repository }}/releases/download/latest/extension.crx"
          
          echo "Building XML for Version: $VERSION"

          cat <<EOF > dist/update.xml
          <?xml version='1.0' encoding='UTF-8'?>
          <gupdate xmlns='http://www.google.com/update2/response' protocol='2.0'>
            <app appid='$APP_ID'>
              <updatecheck codebase='$CRX_URL' version='$VERSION' />
            </app>
          </gupdate>
          EOF

      # 4. Upload to GitHub Releases (Floating 'latest' tag)
      # This overwrites the old release so the URL stays the same
      - name: Update Latest Release
        uses: pyTooling/Actions/releaser@r0
        with:
          tag: latest
          rm_existing_tag: true
          files: |
            dist/extension.crx
            dist/update.xml
          token: ${{ secrets.GITHUB_TOKEN }}
