name: Build & Release TabSync

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── PNPM + Node ───────────────────────────────────────────────────────
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── Chrome private key ────────────────────────────────────────────────
      - name: Restore Chrome private key
        run: echo "${{ secrets.PEM_KEY }}" > key.pem

      # ── Bump version + build + sign everything ────────────────────────────
      # pnpm bump increments patch, then runs pack:all which:
      #   - builds Chrome (dist/) + Firefox (dist-firefox/)
      #   - packages ZIP + CRX for Chrome
      #   - packages ZIP + Mozilla-signed XPI for Firefox
      - name: Bump version & build all
        env:
          AMO_JWT_ISSUER: ${{ secrets.AMO_JWT_ISSUER }}
          AMO_JWT_SECRET: ${{ secrets.AMO_JWT_SECRET }}
        run: pnpm bump

      # ── Read bumped version ───────────────────────────────────────────────
      - name: Read version
        id: ver
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      # ── Commit the version bump back to main ─────────────────────────────
      - name: Commit version bump
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git diff --cached --quiet || git commit -m "chore: bump version to ${{ steps.ver.outputs.version }} [skip ci]"
          git push

      # ── Generate update.xml for Chrome auto-update ────────────────────────
      - name: Generate update.xml
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          APP_ID="${{ secrets.APP_ID }}"
          CRX_URL="https://github.com/${{ github.repository }}/releases/download/latest/tabsync-chrome-v${VERSION}.crx"
          cat <<EOF > build/update.xml
          <?xml version='1.0' encoding='UTF-8'?>
          <gupdate xmlns='http://www.google.com/update2/response' protocol='2.0'>
            <app appid='${APP_ID}'>
              <updatecheck codebase='${CRX_URL}' version='${VERSION}' />
            </app>
          </gupdate>
          EOF

      # ── Upload all artifacts to the rolling "latest" release ──────────────
      - name: Publish to GitHub Releases
        uses: ncipollo/release-action@v1
        with:
          tag: latest
          name: "TabSync v${{ steps.ver.outputs.version }}"
          artifacts: >
            build/tabsync-chrome-v${{ steps.ver.outputs.version }}.zip,
            build/tabsync-chrome-v${{ steps.ver.outputs.version }}.crx,
            build/tabsync-firefox-v${{ steps.ver.outputs.version }}.zip,
            build/tabsync-firefox-v${{ steps.ver.outputs.version }}.xpi,
            build/update.xml
          allowUpdates: true
          removeArtifacts: true
          replacesArtifacts: true
          makeLatest: true
          token: ${{ secrets.GITHUB_TOKEN }}
