<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hello World</title>
  <style>
    body { font-family: sans-serif; padding: 16px; min-width: 260px; }
    h1 { color: #e76f00; margin: 0 0 12px; font-size: 18px; }
    input { width: 100%; box-sizing: border-box; padding: 6px 8px; font-size: 13px; border: 1px solid #ccc; border-radius: 4px; margin-bottom: 8px; }
    button { padding: 7px 14px; font-size: 13px; cursor: pointer; border-radius: 4px; border: none; background: #e76f00; color: #fff; width: 100%; }
    button:active { background: #b85a00; }
    #status { margin-top: 10px; font-size: 13px; color: #333; }
    pre { background: #f4f4f4; padding: 8px; font-size: 11px; white-space: pre-wrap; word-break: break-all; border-radius: 4px; max-height: 200px; overflow-y: auto; }
    .ok { color: green; } .err { color: red; }
  </style>
</head>
<body>
  <h1>Hello World 👋</h1>
  <p style="font-size:13px;margin:0 0 10px">Test fetch without browser API</p>
  <input id="url" type="url" placeholder="https://your-worker.workers.dev" />
  <button id="btn">Fetch →</button>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
